$kind: http-request
method: PATCH
url: '{{baseUrl}}/listings'
order: 3000
headers:
  - key: Authorization
    value: '{{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "id": "{{listingId}}",
      "title": "Updated Listing Title",
      "priceAmount": 26000000,
      "status": "PUBLISHED"
    }
