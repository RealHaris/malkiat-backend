name: Deploy Production

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      run_post_deploy_init:
        description: Run migration and typesense init
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: malkiat-backend
  DEPLOY_ROLE_ARN: arn:aws:iam::915028408783:role/malkiat-github-actions-deploy-role
  PROD_INSTANCE_ID: i-0332143e110a204f5

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="$REGISTRY/${ECR_REPOSITORY}:$IMAGE_TAG"
          docker buildx create --use --name malkiat-builder >/dev/null 2>&1 || docker buildx use malkiat-builder
          docker buildx build --platform linux/amd64 -t "$IMAGE_URI" --push .
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Deploy through SSM
        env:
          INSTANCE_ID: ${{ env.PROD_INSTANCE_ID }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          set -euo pipefail
          IMAGE_REGISTRY="$(echo "$IMAGE_URI" | cut -d/ -f1)"

          read -r -d '' COMMANDS_JSON <<EOF || true
          {
            "commands": [
              "set -euo pipefail",
              "APP_DIR=/opt/malkiat/app",
              "test -f \\\"\$APP_DIR/.env.prod\\\"",
              "test -f \\\"\$APP_DIR/docker-compose.prod.yml\\\"",
              "if ! command -v docker >/dev/null 2>&1; then if command -v dnf >/dev/null 2>&1; then dnf install -y docker; elif command -v yum >/dev/null 2>&1; then yum install -y docker; elif command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y docker.io; else echo no supported package manager found; exit 1; fi; fi",
              "systemctl enable docker || true",
              "systemctl restart docker || systemctl start docker",
              "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${IMAGE_REGISTRY}",
              "if grep -q '^ECR_IMAGE_URI=' \"\$APP_DIR/.env.prod\"; then sed -i 's#^ECR_IMAGE_URI=.*#ECR_IMAGE_URI=${IMAGE_URI}#' \"\$APP_DIR/.env.prod\"; else echo 'ECR_IMAGE_URI=${IMAGE_URI}' >> \"\$APP_DIR/.env.prod\"; fi",
              "cd \"\$APP_DIR\"",
              "docker compose -f docker-compose.prod.yml --env-file .env.prod pull",
              "docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans",
              "sleep 8",
              "curl -fsS http://localhost:3000/users/public"
            ]
          }
          EOF

          printf '%s\n' "$COMMANDS_JSON" > ssm-commands.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://ssm-commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          for _ in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
            echo "SSM status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              break
            fi
            if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelling" ]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --output json
              exit 1
            fi
            sleep 10
          done

          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --output json

      - name: Run post deploy init
        if: github.event_name == 'workflow_dispatch' && inputs.run_post_deploy_init
        env:
          INSTANCE_ID: ${{ env.PROD_INSTANCE_ID }}
        run: |
          set -euo pipefail

          cat > ssm-init.json <<'EOF'
          {
            "commands": [
              "set -euo pipefail",
              "cd /opt/malkiat/app",
              "docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm api npm run db:migrate",
              "docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm api npm run typesense:collection:listings",
              "docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm api npm run typesense:backfill:listings"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://ssm-init.json \
            --query "Command.CommandId" \
            --output text)

          for _ in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
            if [ "$STATUS" = "Success" ]; then
              break
            fi
            if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelling" ]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --output json
              exit 1
            fi
            sleep 10
          done

          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --output json
