name: Deploy Production

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      run_post_deploy_init:
        description: Run migration and typesense init
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: malkiat-backend
  DEPLOY_ROLE_ARN: arn:aws:iam::915028408783:role/malkiat-github-actions-deploy-role
  PROD_INSTANCE_ID: i-0332143e110a204f5
  SSM_LOG_GROUP: /malkiat/ssm/deploy-production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="$REGISTRY/${ECR_REPOSITORY}:$IMAGE_TAG"
          docker buildx create --use --name malkiat-builder >/dev/null 2>&1 || docker buildx use malkiat-builder
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=gha,scope=malkiat-backend \
            --cache-to type=gha,mode=max,scope=malkiat-backend \
            -t "$IMAGE_URI" \
            --push \
            .
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Build SSM deploy command
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          set -euo pipefail
          IMAGE_REGISTRY="$(echo "$IMAGE_URI" | cut -d/ -f1)"
          COMMANDS_JSON=$(jq -nc \
            --arg reg "$IMAGE_REGISTRY" \
            --arg img "$IMAGE_URI" \
            '[
              "set -euxo pipefail",
              "APP_DIR=/opt/malkiat/app",
              "cd $APP_DIR",
              "if ! command -v docker >/dev/null 2>&1; then if command -v dnf >/dev/null 2>&1; then dnf install -y docker; elif command -v yum >/dev/null 2>&1; then yum install -y docker; elif command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y docker.io; else echo no supported package manager found; exit 1; fi; fi",
              "systemctl enable docker || true",
              "systemctl restart docker || systemctl start docker",
              "echo disk-before-cleanup && df -h",
              "docker image prune -af || true",
              "docker builder prune -af || true",
              "docker container prune -f || true",
              "echo disk-after-cleanup && df -h",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin \($reg)",
              "export ECR_IMAGE_URI=\($img)",
              "docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans",
              "curl -fsS --retry 30 --retry-delay 2 --retry-connrefused http://localhost:3000/users/public >/dev/null || { echo api-healthcheck-failed; docker compose -f docker-compose.prod.yml --env-file .env.prod ps; docker compose -f docker-compose.prod.yml --env-file .env.prod logs --tail=200 api || true; docker compose -f docker-compose.prod.yml --env-file .env.prod logs --tail=200 worker || true; exit 1; }"
            ]')
          jq -nc --argjson commands "$COMMANDS_JSON" '{commands:$commands}' > .ssm-deploy-parameters.json

      - name: Deploy through SSM
        env:
          INSTANCE_ID: ${{ env.PROD_INSTANCE_ID }}
          SSM_LOG_GROUP: ${{ env.SSM_LOG_GROUP }}
        run: |
          set -euo pipefail
          aws logs create-log-group --log-group-name "$SSM_LOG_GROUP" >/dev/null 2>&1 || true
          aws logs put-retention-policy --log-group-name "$SSM_LOG_GROUP" --retention-in-days 14 >/dev/null 2>&1 || true

          print_ssm_diagnostics() {
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --output json || true
            aws ssm list-command-invocations --command-id "$COMMAND_ID" --details --output json || true
            aws logs tail "$SSM_LOG_GROUP" --log-stream-name-prefix "$COMMAND_ID/$INSTANCE_ID" --since 30m --format short || true
          }

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://.ssm-deploy-parameters.json \
            --cloud-watch-output-config "CloudWatchOutputEnabled=true,CloudWatchLogGroupName=$SSM_LOG_GROUP" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          for _ in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
            echo "SSM status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              break
            fi
            if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelling" ]; then
              print_ssm_diagnostics
              exit 1
            fi
            sleep 10
          done

          print_ssm_diagnostics

      - name: Run post deploy init
        if: github.event_name == 'workflow_dispatch' && inputs.run_post_deploy_init
        env:
          INSTANCE_ID: ${{ env.PROD_INSTANCE_ID }}
          SSM_LOG_GROUP: ${{ env.SSM_LOG_GROUP }}
        run: |
          set -euo pipefail
          INIT_JSON=$(jq -nc '[
            "set -euxo pipefail",
            "cd /opt/malkiat/app",
            "docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm api bun run db:migrate",
            "docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm api bun run typesense:collection:listings",
            "docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm api bun run typesense:backfill:listings"
          ]')

          jq -nc --argjson commands "$INIT_JSON" '{commands:$commands}' > .ssm-init-parameters.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://.ssm-init-parameters.json \
            --cloud-watch-output-config "CloudWatchOutputEnabled=true,CloudWatchLogGroupName=$SSM_LOG_GROUP" \
            --query "Command.CommandId" \
            --output text)

          print_ssm_diagnostics() {
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --output json || true
            aws ssm list-command-invocations --command-id "$COMMAND_ID" --details --output json || true
            aws logs tail "$SSM_LOG_GROUP" --log-stream-name-prefix "$COMMAND_ID/$INSTANCE_ID" --since 30m --format short || true
          }

          for _ in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
            if [ "$STATUS" = "Success" ]; then
              break
            fi
            if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelling" ]; then
              print_ssm_diagnostics
              exit 1
            fi
            sleep 10
          done

          print_ssm_diagnostics
